# Configuración Serenity para la POC LATAM
webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    "goog:chromeOptions" {
      args = ["--start-maximized", "--disable-gpu", "--no-sandbox",
              "--disable-dev-shm-usage", "--remote-allow-origins=*"]
    }
  }
}

headless.mode = true

serenity {
  take.screenshots = FOR_FAILURES
  project.name = "LATAM Búsqueda de Vuelos - GreenSQA POC"
}

# Permite override por línea de comandos:
#   mvn verify -Dwebdriver.driver=firefox -Dheadless.mode=false
base.url = "https://www.latamairlines.com/co/es"
