# Configuración Serenity para la POC LATAM
webdriver {
  driver = chrome
  autodownload = true
  capabilities {
    pageLoadStrategy = "eager"
    "goog:chromeOptions" {
      args = [
        "--start-maximized",
        "--disable-gpu",
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--remote-allow-origins=*",
        "--disable-blink-features=AutomationControlled",
        "--lang=es-CO",
        "--window-size=1920,1080"
      ]
      excludeSwitches = ["enable-automation"]
      useAutomationExtension = false
    }
  }
}

# Headless activo por defecto; override: mvn verify -Dheadless.mode=false
headless.mode = true

webdriver.wait.for.timeout = 15000
webdriver.timeouts.pageLoadTimeout = 60000

serenity {
  take.screenshots = FOR_FAILURES
  project.name = "LATAM Búsqueda de Vuelos - GreenSQA POC"
}

# Permite override por línea de comandos:
#   mvn verify -Dwebdriver.driver=firefox -Dheadless.mode=false
base.url = "https://www.latamairlines.com/co/es"
